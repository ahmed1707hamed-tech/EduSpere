

name: edusphere

x-defaults: &defaults
  restart: unless-stopped
  networks:
    - edusphere

services:
  postgres:
    image: postgres:16-alpine
    <<: *defaults
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    <<: *defaults
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    <<: *defaults
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12

  auth-service:
    build:
      context: ./services/auth-service
    <<: *defaults
    env_file:
      - ./services/auth-service/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_db
      SECRET_KEY: ${SECRET_KEY:-local-development-secret-key-change-before-production}
      ALGORITHM: HS256
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-service-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  course-service:
    build:
      context: ./services/course-service
    <<: *defaults
    env_file:
      - ./services/course-service/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/course_db
      SECRET_KEY: ${SECRET_KEY:-local-development-secret-key-change-before-production}
      ALGORITHM: HS256
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-service-key}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  content-service:
    build:
      context: ./services/content-service
    <<: *defaults
    env_file:
      - ./services/content-service/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/content_db
      SECRET_KEY: ${SECRET_KEY:-local-development-secret-key-change-before-production}
      ALGORITHM: HS256
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_BUCKET: edusphere-content
      S3_REGION: us-east-1
      MAX_UPLOAD_BYTES: 1073741824
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  quiz-service:
    build:
      context: ./services/quiz-service
    <<: *defaults
    env_file:
      - ./services/quiz-service/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/quiz_db
      SECRET_KEY: ${SECRET_KEY:-local-development-secret-key-change-before-production}
      ALGORITHM: HS256
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-service-key}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  notification-service:
    build:
      context: ./services/notification-service
    <<: *defaults
    env_file:
      - ./services/notification-service/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notification_db
      SECRET_KEY: ${SECRET_KEY:-local-development-secret-key-change-before-production}
      ALGORITHM: HS256
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-service-key}
      FRONTEND_URL: ${FRONTEND_URL:-http://frontend}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@edusphere.local}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./services/api-gateway
    <<: *defaults
    env_file:
      - ./services/api-gateway/.env
    environment:
      SECRET_KEY: ${SECRET_KEY:-local-development-secret-key-change-before-production}
      ALGORITHM: HS256
      REDIS_URL: redis://redis:6379/0
      AUTH_SERVICE_URL: http://auth-service:8001
      COURSE_SERVICE_URL: http://course-service:8002
      CONTENT_SERVICE_URL: http://content-service:8003
      QUIZ_SERVICE_URL: http://quiz-service:8004
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      RATE_LIMIT_PER_MINUTE: 120
      CORS_ORIGINS: http://localhost,http://localhost:3000,http://localhost:5173
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      course-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
      quiz-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend/student-ui
    <<: *defaults
    depends_on:
      api-gateway:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/share/nginx/html/index.html"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    <<: *defaults
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      course-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
      quiz-service:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  edusphere:
    driver: bridge