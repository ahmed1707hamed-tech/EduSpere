{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "content-chart.secretName" . }}
  labels:
    {{- include "content-chart.labels" . | nindent 4 }}
    app.kubernetes.io/name: app-secret
type: Opaque
stringData:
  {{- range $key, $value := .Values.secret.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
