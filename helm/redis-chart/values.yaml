replicaCount: 1

nameOverride: redis
fullnameOverride: redis

image:
  repository: redis
  tag: 7-alpine
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 6379
  targetPort: redis

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

config:
  create: false
  name: redis-config
  data: {}

secret:
  create: false
  name: redis-secret
  data: {}

command:
  - redis-server
  - --appendonly
  - "yes"

persistence:
  enabled: true
  existingClaim: ""
  name: redis-pvc
  storageClass: standard
  accessModes:
    - ReadWriteOnce
  size: 2Gi
  mountPath: /data

livenessProbe:
  exec:
    command:
      - redis-cli
      - ping
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  exec:
    command:
      - redis-cli
      - ping
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

strategy:
  type: Recreate

terminationGracePeriodSeconds: 30

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
