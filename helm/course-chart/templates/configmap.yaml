{{- if .Values.config.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "course-chart.configMapName" . }}
  labels:
    {{- include "course-chart.labels" . | nindent 4 }}
    app.kubernetes.io/name: app-config
data:
  {{- range $key, $value := .Values.config.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
