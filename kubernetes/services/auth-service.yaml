# Internal ClusterIP service for auth-service
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: edusphere
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: edusphere
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: auth-service
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
