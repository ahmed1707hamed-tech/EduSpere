# Internal ClusterIP service for api-gateway
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: edusphere
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: edusphere
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
