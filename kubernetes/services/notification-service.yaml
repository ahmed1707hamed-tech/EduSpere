# Internal ClusterIP service for notification-service
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: edusphere
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: edusphere
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: notification-service
  ports:
    - name: http
      port: 8005
      targetPort: http
      protocol: TCP
