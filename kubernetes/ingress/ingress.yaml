# Ingress – routes external traffic to microservices via k3s Traefik or NGINX Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edusphere-ingress
  namespace: edusphere
  labels:
    app.kubernetes.io/name: edusphere-ingress
    app.kubernetes.io/part-of: edusphere
  annotations:
    # k3s ships with Traefik; swap to nginx class if using ingress-nginx
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: edusphere.local
      http:
        paths:
          # Backend API routes – more specific paths first
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8000
          - path: /course
            pathType: Prefix
            backend:
              service:
                name: course-service
                port:
                  number: 8000
          - path: /content
            pathType: Prefix
            backend:
              service:
                name: content-service
                port:
                  number: 8000
          - path: /quiz
            pathType: Prefix
            backend:
              service:
                name: quiz-service
                port:
                  number: 8000
          # Frontend catch-all – must be last
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
