# Ingress – routes external traffic via k3s Traefik ingress controller
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edusphere-ingress
  namespace: edusphere
  labels:
    app.kubernetes.io/name: edusphere-ingress
    app.kubernetes.io/part-of: edusphere
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: edusphere.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8001
          - path: /course
            pathType: Prefix
            backend:
              service:
                name: course-service
                port:
                  number: 8002
          - path: /content
            pathType: Prefix
            backend:
              service:
                name: content-service
                port:
                  number: 8003
          - path: /quiz
            pathType: Prefix
            backend:
              service:
                name: quiz-service
                port:
                  number: 8004
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
