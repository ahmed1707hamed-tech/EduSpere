# Quiz microservice – manages quizzes and assessments
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-service
  namespace: edusphere
  labels:
    app.kubernetes.io/name: quiz-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: edusphere
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: quiz-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quiz-service
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: edusphere
    spec:
      containers:
        - name: quiz-service
          image: ahmed7amed9/edusphere-quiz-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8004
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: QUIZ_DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SECRET_KEY
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: INTERNAL_API_KEY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
