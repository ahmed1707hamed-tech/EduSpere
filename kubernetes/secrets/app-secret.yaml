# Sensitive credentials – replace values before applying to production
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: edusphere
  labels:
    app.kubernetes.io/name: app-secret
    app.kubernetes.io/part-of: edusphere
type: Opaque
stringData:
  SECRET_KEY: replace-with-a-secure-jwt-key
  INTERNAL_API_KEY: replace-with-service-to-service-secret
  DATABASE_USER: postgres
  DATABASE_PASSWORD: change-me
  AUTH_DATABASE_URL: postgresql://postgres:change-me@postgres.edusphere.svc.cluster.local:5432/auth_db
  COURSE_DATABASE_URL: postgresql://postgres:change-me@postgres.edusphere.svc.cluster.local:5432/course_db
  CONTENT_DATABASE_URL: postgresql://postgres:change-me@postgres.edusphere.svc.cluster.local:5432/content_db
  QUIZ_DATABASE_URL: postgresql://postgres:change-me@postgres.edusphere.svc.cluster.local:5432/quiz_db
  NOTIFICATION_DATABASE_URL: postgresql://postgres:change-me@postgres.edusphere.svc.cluster.local:5432/notification_db
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: change-me-minio-password
