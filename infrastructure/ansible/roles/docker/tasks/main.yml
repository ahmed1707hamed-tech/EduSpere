---
- name: Remove conflicting Docker APT source files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/sources.list.d/docker.sources
    - /etc/apt/keyrings/docker.asc

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name: "{{ docker_prerequisite_packages }}"
    state: present
    update_cache: true

- name: Ensure APT keyrings directory exists
  ansible.builtin.file:
    path: "{{ docker_gpg_key_path | dirname }}"
    state: directory
    mode: "0755"

- name: Add Docker official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: "{{ docker_gpg_key_path }}"
    mode: "0644"

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: "{{ docker_apt_repository }}"
    filename: docker
    state: present

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true

- name: Enable Docker service
  ansible.builtin.service:
    name: "{{ docker_service_name }}"
    enabled: true

- name: Start Docker service
  ansible.builtin.service:
    name: "{{ docker_service_name }}"
    state: started

- name: Add ubuntu user to docker group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: "{{ docker_group }}"
    append: true

- name: Verify Docker installation
  ansible.builtin.command:
    cmd: docker --version
  register: docker_version
  changed_when: false

- name: Verify Docker Compose plugin
  ansible.builtin.command:
    cmd: "{{ docker_compose_command }} version"
  register: docker_compose_version
  changed_when: false
